<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X Dim Mode</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="../images/icon-48.png" alt="Icon" class="logo" />
      <h1>Dim Mode</h1>
    </div>
    <p class="subtitle">Classic dark-blue theme for X&nbsp;/&nbsp;Twitter</p>
    <div class="toggle-row">
      <span class="label" id="statusLabel">Enabled</span>
      <label class="switch">
        <input type="checkbox" id="toggleSwitch" checked />
        <span class="slider"></span>
      </label>
    </div>
    <p class="hint">Changes apply instantly on x.com tabs.</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
